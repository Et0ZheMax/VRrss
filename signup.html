
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Viking Bots</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="main">
    <div class="signin-wrapper">
        <div class="signin">
            <img src="images/signin_icon.svg" alt="" class="signin__icon">
            <h1 class="signin__heading">Регистрация</h1>

            <form class="signin__form" method="post" action="signup.html">
                <label class="signin__form__field">
                    <span>Имя</span>
                    <span class="signin__form__field__input">
                        <img src="images/login_icon.svg" alt="">
                        <input type="text" placeholder="Введите свое имя" name="name">
                    </span>
                </label>

                <label class="signin__form__field">
                    <span>Телефон</span>
                    <span class="signin__form__field__input">
                        <img src="images/phone_icon.svg" alt="">
                        <input type="text" id="phone-mask" placeholder="Введите свой номер телефона" name="phone">
                    </span>
                </label>

                <label class="signin__form__field">
                    <span>Логин</span>
                    <span class="signin__form__field__input">
                        <img src="images/login_icon.svg" alt="">
                        <input type="text" placeholder="Введите логин" name="login">
                    </span>
                </label>

                <label class="signin__form__field">
                    <span>Пароль</span>
                    <span class="signin__form__field__input">
                        <img src="images/lock_icon.svg" alt="">
                        <input type="password" placeholder="*******" name="password">
                    </span>
                </label>

                <label class="signin__form__field">
                    <span>Подтверждение пароля</span>
                    <span class="signin__form__field__input">
                        <img src="images/lock_icon.svg" alt="">
                        <input type="password" placeholder="*******" name="password2">
                    </span>
                </label>

                <a href="signup.html#" class="signin__forgot">Забыли пароль?</a>

                

                

                <button class="basic-btn signin__submit" type="submit">
                    Зарегистрироваться
                </button>
            </form>

            <p class="signin__register">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </p>
        </div>
    </div>
</main>


<script src="https://unpkg.com/imask"></script>
<script src="js/script.js"></script>
</body>
</html>
