
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in | Viking Bots</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="main">
    <div class="signin-wrapper">
        <div class="signin">
            <img src="images/signin_icon.svg" alt="" class="signin__icon">
            <h1 class="signin__heading">Вход в учетную запись</h1>

            <form class="signin__form" method="post" action="login.html">
                <label class="signin__form__field">
                    <span>Логин</span>
                    <span class="signin__form__field__input">
                    <img src="images/login_icon.svg" alt="">
                    <input type="text" placeholder="Введите имя пользователя" name="login">
                </span>
                </label>

                <label class="signin__form__field">
                    <span>Пароль</span>
                    <span class="signin__form__field__input">
                    <img src="images/lock_icon.svg" alt="">
                    <input type="password" placeholder="*******" name="password">
                </span>
                </label>

                <input type="text" name="to" value="/whatsapp_support" hidden>

                

                <a href="whatsapp_support.html#" class="signin__forgot">Забыли пароль?</a>

                <button class="basic-btn signin__submit" type="submit">
                    Войти
                </button>
            </form>

            <p class="signin__register">
                Еще нет аккаунта? <a href="signup.html">Зарегистрироваться</a>
            </p>
        </div>
    </div>
</main>

<script src="https://unpkg.com/imask"></script>
<script src="js/script.js"></script>
</body>
</html>
